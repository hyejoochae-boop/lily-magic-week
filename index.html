<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Joy and Lily's Wonderful Week</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Joy & Lily">
<meta name="theme-color" content="#9d6eff">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #4b2a68;
    --violet: #9d6eff;
    --pink: #ff7eb3;
    --gold: #ffd76a;
    --coral: #ff7a45;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100%; overscroll-behavior: none; -webkit-touch-callout: none; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    color: white;
    background:
      radial-gradient(circle at 12% 12%, rgba(255, 237, 152, 0.78) 0 9%, transparent 22%),
      radial-gradient(circle at 85% 10%, rgba(164, 222, 255, 0.72) 0 11%, transparent 26%),
      radial-gradient(circle at 72% 78%, rgba(255, 126, 179, 0.54) 0 14%, transparent 32%),
      linear-gradient(180deg, #8064d9 0%, #b784e8 42%, #ffd5ec 100%);
    overflow-x: hidden;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-user-select: none;
    user-select: none;
  }
  input, textarea { -webkit-user-select: text; user-select: text; }

  /* ── 배경 장식 ── */
  .stars, .weather-drift { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star { position: absolute; color: white; opacity: 0; animation: twinkle 3.4s infinite; text-shadow: 0 0 12px rgba(255, 235, 165, 0.95); }
  .drift { position: absolute; opacity: 0.35; animation: driftAcross linear infinite; filter: drop-shadow(0 4px 10px rgba(255,255,255,0.35)); }
  @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.35) rotate(0); } 50% { opacity: 1; transform: scale(1.25) rotate(12deg); } }
  @keyframes driftAcross { from { transform: translateX(-15vw); } to { transform: translateX(115vw); } }

  /* ── 레이아웃 ── */
  .container {
    max-width: 900px; margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative; z-index: 2;
  }

  /* ── 헤더 ── */
  header { text-align: center; margin-bottom: 44px; }
  .title-main {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.8rem, 5.5vw, 3.2rem);
    color: #fff7cf;
    text-shadow: 0 3px 0 #b858ba, 0 9px 26px rgba(63, 36, 120, 0.38), 0 0 28px rgba(255,255,255,0.75);
    line-height: 1.15;
    margin-bottom: 12px;
  }
  .title-ribbon {
    display: inline-block;
    margin: 0 auto 10px;
    padding: 6px 30px 8px;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(255,126,179,.9), rgba(157,110,255,.92), rgba(114,205,255,.9));
    border: 2px solid rgba(255,255,255,.72);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 8px 24px rgba(83,48,130,.28);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: clamp(.85rem, 2.4vw, 1.05rem);
    font-weight: 700;
  }
  .title-sub {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: rgba(255,255,255,.88);
    text-shadow: 0 2px 8px rgba(66,35,100,.35);
    margin-top: 6px;
  }

  /* ── 캐릭터 버튼 ── */
  .char-buttons {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 52px;
  }

  .char-btn {
    width: min(340px, calc(50% - 12px));
    min-width: 240px;
    border-radius: 28px;
    padding: 30px 20px 26px;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    border: 3px solid rgba(255,255,255,.65);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 22px 54px rgba(60,35,110,.3), inset 0 1px 0 rgba(255,255,255,.55);
    transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .char-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(255,255,255,.22), transparent 70%);
    pointer-events: none;
  }
  .char-btn:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 32px 70px rgba(60,35,110,.38);
  }
  .char-btn:active { transform: translateY(-2px) scale(1.0); }

  .lily-btn {
    background: linear-gradient(160deg, rgba(157,110,255,.42), rgba(255,126,179,.32), rgba(100,80,200,.18));
    border-color: rgba(200,160,255,.7);
  }
  .joy-btn {
    background: linear-gradient(160deg, rgba(255,180,60,.42), rgba(255,120,100,.32), rgba(200,100,50,.18));
    border-color: rgba(255,200,120,.7);
  }

  .char-fairy { width: 150px; height: 150px; }
  .char-fairy svg { width: 100%; height: 100%; overflow: visible; filter: drop-shadow(0 8px 18px rgba(0,0,0,.22)); }

  .char-name {
    font-family: 'Pacifico', cursive;
    font-size: 2.2rem;
    line-height: 1;
    text-shadow: 0 3px 0 rgba(0,0,0,.18);
  }
  .lily-btn .char-name { color: #fff4f8; text-shadow: 0 3px 0 #b858ba; }
  .joy-btn  .char-name { color: #fff8e8; text-shadow: 0 3px 0 #c05010; }

  .char-tagline {
    font: 700 .95rem 'Noto Sans KR', sans-serif;
    color: rgba(255,255,255,.88);
    margin-top: -4px;
  }
  .char-enter {
    margin-top: 8px;
    background: rgba(255,255,255,.22);
    border: 2px solid rgba(255,255,255,.65);
    border-radius: 999px;
    padding: 8px 24px;
    font: 700 .92rem 'Noto Sans KR', sans-serif;
    color: white;
    transition: background .15s;
  }
  .char-btn:hover .char-enter { background: rgba(255,255,255,.35); }

  /* ── 공유 메모 보드 ── */
  .shared-board {
    border-radius: 28px;
    padding: 28px 24px 32px;
    border: 2px solid rgba(255,255,255,.55);
    background: linear-gradient(160deg, rgba(255,255,255,.18), rgba(200,180,255,.12));
    box-shadow: 0 22px 52px rgba(58,34,102,.22), inset 0 1px 0 rgba(255,255,255,.42);
  }
  .board-header {
    text-align: center;
    margin-bottom: 24px;
  }
  .board-header h2 {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 900;
    font-size: clamp(1.4rem, 4vw, 1.85rem);
    color: #fff7cf;
    text-shadow: 0 2px 0 #b858ba, 0 6px 16px rgba(63,36,120,.3);
    margin-bottom: 6px;
  }
  .board-header p {
    font: 700 .88rem 'Noto Sans KR', sans-serif;
    color: rgba(255,255,255,.65);
  }

  /* 메시지 리스트 */
  .msg-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 22px;
    min-height: 90px;
    max-height: 480px;
    overflow-y: auto;
    padding: 2px 4px;
  }
  .msg-list::-webkit-scrollbar { width: 4px; }
  .msg-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.25); border-radius: 2px; }

  .msg-empty {
    text-align: center;
    padding: 28px;
    font: 700 1rem 'Noto Sans KR', sans-serif;
    color: rgba(255,255,255,.42);
  }
  .msg-empty .empty-icon { display: block; font-size: 2.4rem; margin-bottom: 8px; }

  .msg-bubble {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 18px;
    word-break: break-word;
    animation: bubblePop .35s ease;
  }
  @keyframes bubblePop { 0%{transform:scale(.88);opacity:0} 100%{transform:scale(1);opacity:1} }

  .msg-bubble.from-lily {
    align-self: flex-start;
    background: rgba(157,110,255,.3);
    border: 1.5px solid rgba(180,140,255,.55);
    border-bottom-left-radius: 6px;
  }
  .msg-bubble.from-joy {
    align-self: flex-end;
    background: rgba(255,160,60,.3);
    border: 1.5px solid rgba(255,180,80,.55);
    border-bottom-right-radius: 6px;
  }
  .msg-sender {
    font: 700 .72rem 'Noto Sans KR', sans-serif;
    margin-bottom: 4px;
    opacity: .88;
  }
  .from-lily .msg-sender { color: #d8b4ff; }
  .from-joy  .msg-sender { color: #ffd08a; }
  .msg-text {
    font: 500 .95rem 'Noto Sans KR', sans-serif;
    color: rgba(255,255,255,.95);
    line-height: 1.55;
    white-space: pre-wrap;
  }
  .msg-date {
    font: 500 .66rem 'Noto Sans KR', sans-serif;
    color: rgba(255,255,255,.42);
    margin-top: 5px;
    text-align: right;
  }
  .msg-del {
    float: right;
    background: none;
    border: none;
    color: rgba(255,255,255,.35);
    font-size: .8rem;
    cursor: pointer;
    margin-left: 8px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .msg-del:hover { color: rgba(255,150,150,.8); background: rgba(255,80,80,.18); }

  /* 쪽지 작성 */
  .compose-wrap {
    background: rgba(255,255,255,.1);
    border-radius: 18px;
    padding: 18px;
    border: 1.5px solid rgba(255,255,255,.22);
  }
  .compose-title {
    font: 700 .82rem 'Noto Sans KR', sans-serif;
    color: rgba(255,255,255,.65);
    margin-bottom: 10px;
    text-align: center;
  }
  .sender-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .sender-btn {
    flex: 1;
    padding: 9px 6px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,.28);
    background: rgba(255,255,255,.1);
    color: rgba(255,255,255,.72);
    font: 700 .92rem 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all .18s;
  }
  .sender-btn:hover { background: rgba(255,255,255,.2); }
  .sender-btn.active-lily {
    background: rgba(157,110,255,.4);
    border-color: #c4a0ff;
    color: white;
    box-shadow: 0 4px 14px rgba(157,110,255,.3);
  }
  .sender-btn.active-joy {
    background: rgba(255,160,60,.4);
    border-color: #ffb060;
    color: white;
    box-shadow: 0 4px 14px rgba(255,140,50,.3);
  }
  .msg-textarea {
    width: 100%;
    background: rgba(255,255,255,.12);
    border: 1.5px solid rgba(255,255,255,.25);
    border-radius: 12px;
    color: white;
    font: 500 1rem 'Noto Sans KR', sans-serif;
    padding: 12px 14px;
    resize: none;
    box-sizing: border-box;
    outline: none;
    line-height: 1.5;
    transition: border-color .15s;
    touch-action: manipulation;
  }
  .msg-textarea:focus { border-color: rgba(255,255,255,.55); }
  .msg-textarea::placeholder { color: rgba(255,255,255,.32); }
  .msg-send-btn {
    margin-top: 12px;
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #9d6eff, #ff7eb3);
    color: white;
    font: 700 1rem 'Noto Sans KR', sans-serif;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(100,60,160,.25);
    transition: opacity .15s, transform .12s;
  }
  .msg-send-btn:hover { opacity: .9; transform: translateY(-1px); }
  .msg-send-btn:active { opacity: .85; transform: translateY(0); }

  /* 메시지 안 사진/동영상 */
  .msg-media {
    display: block;
    max-width: 100%;
    max-height: 320px;
    border-radius: 12px;
    margin-bottom: 8px;
    border: 1.5px solid rgba(255,255,255,.35);
    background: rgba(0,0,0,.15);
  }
  .msg-media.is-image { cursor: zoom-in; object-fit: cover; }
  video.msg-media { width: 100%; }
  .msg-bubble:has(.msg-media) { max-width: 92%; }

  /* 첨부 버튼 & 미리보기 */
  .attach-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .attach-btn {
    flex: 1;
    padding: 11px 8px;
    border-radius: 12px;
    border: 1.5px dashed rgba(255,255,255,.4);
    background: rgba(255,255,255,.08);
    color: rgba(255,255,255,.8);
    font: 700 .92rem 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all .18s;
  }
  .attach-btn:hover { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.6); }
  .attach-btn:active { transform: translateY(1px); }
  .attach-btn:disabled { opacity: .5; cursor: default; }

  .attach-preview {
    margin-top: 12px;
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    border: 1.5px solid rgba(255,255,255,.3);
    background: rgba(0,0,0,.18);
  }
  .attach-preview img, .attach-preview video {
    display: block;
    width: 100%;
    max-height: 220px;
    object-fit: contain;
    background: rgba(0,0,0,.25);
  }
  .attach-remove {
    position: absolute;
    top: 8px; right: 8px;
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.85);
    background: rgba(30,10,50,.7);
    color: white;
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
  }
  .attach-remove:hover { background: rgba(255,80,80,.85); }
  .attach-status {
    padding: 12px;
    text-align: center;
    font: 700 .88rem 'Noto Sans KR', sans-serif;
    color: rgba(255,255,255,.8);
  }

  /* 사진 확대 라이트박스 */
  .lightbox {
    position: fixed; inset: 0;
    z-index: 300;
    background: rgba(20,8,40,.9);
    display: none;
    align-items: center; justify-content: center;
    padding: 24px;
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    cursor: zoom-out;
  }
  .lightbox.show { display: flex; }
  .lightbox img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }

  /* 토스트 */
  .toast {
    position: fixed; top: 70px; left: 50%;
    transform: translateX(-50%) translateY(-100px);
    z-index: 210; opacity: 0;
    transition: all .45s cubic-bezier(.34,1.56,.64,1);
    max-width: 92vw; white-space: nowrap;
    padding: 12px 22px; border-radius: 999px;
    background: linear-gradient(135deg, #fff4a7, #ff9dca);
    color: var(--ink); border: 3px solid white;
    box-shadow: 0 12px 28px rgba(85,45,122,.28);
    font: 700 .95rem 'Noto Sans KR', sans-serif;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── 아바타 애니메이션 ── */
  .floating { animation: fairyFloat 3.1s ease-in-out infinite; transform-origin: center; }
  @keyframes fairyFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .wings-anim { animation: wingFlap 1.45s ease-in-out infinite; transform-origin: 200px 220px; }
  @keyframes wingFlap { 0%, 100% { transform: scaleX(1); } 50% { transform: scaleX(.92); } }
  .new-item { animation: newItemGlow 1.15s ease-out; transform-origin: center; }
  @keyframes newItemGlow { 0%{opacity:0;transform:scale(0) rotate(-25deg);filter:drop-shadow(0 0 18px #fff4a7)} 55%{opacity:1;transform:scale(1.25)} 100%{opacity:1;transform:scale(1)} }
  .av-loading { font-size: 3.5rem; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; animation: fairyFloat 2s ease-in-out infinite; }

  /* 반응형 */
  @media (max-width: 580px) {
    .char-buttons { flex-direction: column; align-items: center; }
    .char-btn { width: min(340px, 100%); }
    .shared-board { padding: 20px 14px 24px; }
    .compose-wrap { padding: 14px; }
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="weather-drift" id="weatherDrift"></div>
<div class="toast" id="toast"></div>

<div class="container">
  <header>
    <div class="title-main">Joy and Lily's</div>
    <div class="title-main" style="margin-top:-6px">Wonderful Week</div>
    <div class="title-ribbon">🪽 Weather Fairies 🪽</div>
    <div class="title-sub">날씨 요정들의 특별한 일주일로 들어오세요!</div>
  </header>

  <!-- ── 캐릭터 버튼 ── -->
  <div class="char-buttons">

    <!-- Joy 버튼 -->
    <a href="joy.html" class="char-btn joy-btn">
      <div class="char-fairy" id="avJoy"><div class="av-loading">🌟</div></div>
      <div class="char-name">Joy</div>
      <div class="char-tagline">🌈 Weather Fairy</div>
      <div class="char-enter">Joy's Room 입장 ✨</div>
    </a>

    <!-- Lily 버튼 -->
    <a href="lily.html" class="char-btn lily-btn">
      <div class="char-fairy" id="avLily"><div class="av-loading">🧚</div></div>
      <div class="char-name">Lily</div>
      <div class="char-tagline">🌙 Weather Fairy</div>
      <div class="char-enter">Lily's Room 입장 ✨</div>
    </a>

  </div>

  <!-- ── 공유 쪽지 보드 ── -->
  <section class="shared-board">
    <div class="board-header">
      <h2>💌 Joy & Lily's 쪽지 보드</h2>
      <p>서로에게 쪽지를 남겨보세요 ✨</p>
    </div>

    <div class="msg-list" id="msgList">
      <div class="msg-empty">
        <span class="empty-icon">💌</span>
        아직 쪽지가 없어요. 첫 번째 쪽지를 남겨보세요!
      </div>
    </div>

    <div class="compose-wrap">
      <div class="compose-title">쪽지 보내는 사람을 선택하세요</div>
      <div class="sender-row">
        <button type="button" class="sender-btn active-lily" id="btnLily" onclick="setSender('lily')">🧚 Lily</button>
        <button type="button" class="sender-btn" id="btnJoy"  onclick="setSender('joy')">🌟 Joy</button>
      </div>
      <textarea class="msg-textarea" id="msgInput" rows="3" placeholder="쪽지 내용을 입력하세요..."></textarea>

      <div class="attach-preview" id="attachPreview" style="display:none;"></div>

      <div class="attach-row">
        <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;" onchange="handleFile(event)">
        <button type="button" class="attach-btn" id="attachBtn" onclick="document.getElementById('fileInput').click()">📷 사진 · 🎬 동영상 첨부</button>
      </div>

      <button type="button" class="msg-send-btn" onclick="sendMsg()">보내기 💌</button>
    </div>
  </section>
</div>

<!-- 사진 확대 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()"><img id="lightboxImg" src="" alt=""></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
// ── 아바타 데이터 ──────────────────────────────
const LILY_WEEK_ITEMS = [
  ['🌸','Flower Crown','char'],['🌈','Magic Rainbow','bg'],['💫','Sparkle Wand','char'],
  ['🏰','Fairy Castle','bg'],['🦋','Butterfly Wings','char'],['⭐','Star Shower','bg'],['🌟','Full Magic','char']
];

const AVATAR_ITEMS = [
  {id:'av_hair_bow',cat:'avatar'},{id:'av_hair_pink',cat:'avatar'},{id:'av_hair_star',cat:'avatar'},{id:'av_hair_flower',cat:'avatar'},
  {id:'av_outfit_princess',cat:'avatar'},{id:'av_outfit_rainbow',cat:'avatar'},{id:'av_outfit_galaxy',cat:'avatar'},
  {id:'av_outfit_pink',cat:'avatar'},{id:'av_outfit_angel',cat:'avatar'},{id:'av_outfit_mermaid',cat:'avatar'},
  {id:'av_outfit_witch',cat:'avatar'},{id:'av_outfit_star',cat:'avatar'},{id:'av_outfit_rose',cat:'avatar'},
  {id:'av_acc_tiara',cat:'avatar'},{id:'av_acc_necklace',cat:'avatar'},{id:'av_acc_glasses',cat:'avatar'},
  {id:'av_acc_ribbon',cat:'avatar'},{id:'av_acc_earrings',cat:'avatar'},
  {id:'av_shoes_glass',cat:'avatar'},{id:'av_shoes_star',cat:'avatar'},{id:'av_shoes_rainbow',cat:'avatar'},
  {id:'av_shoes_flower',cat:'avatar'},{id:'av_shoes_moon',cat:'avatar'},
  {id:'av_bag_star',cat:'avatar'},{id:'av_bag_heart',cat:'avatar'},{id:'av_bag_rainbow',cat:'avatar'},
  {id:'av_bag_flower',cat:'avatar'},{id:'av_bag_magic',cat:'avatar'}
];

const CHAR_COLORS = {
  lily: { hair:'#d98b27', hairDark:'#9f6320', skin:'#ffe2c2', accent:'#c07bde', dress:'#e090ff', dressDark:'#a855d8' },
  joy:  { hair:'#d98b27', hairDark:'#9f6320', skin:'#ffe2c2', accent:'#f7a916', dress:'#ffc23d', dressDark:'#f39a16' }

function getUnlockedItems(history) {

// 동영상 최대 용량 (무료 DB 보호용). 초과 시 안내.
const MAX_VIDEO_MB = 12;

// ── 첨부 파일 선택 ──
function handleFile(e) {
  const file = e.target.files && e.target.files[0];
  e.target.value = '';           // 같은 파일 다시 선택 가능하도록 초기화
  if (!file) return;

  const preview = document.getElementById('attachPreview');
  const isImage = file.type.startsWith('image/');
  const isVideo = file.type.startsWith('video/');
  if (!isImage && !isVideo) { showToast('사진 또는 동영상만 첨부할 수 있어요.'); return; }

  preview.style.display = 'block';
  preview.innerHTML = `<div class="attach-status">⏳ 불러오는 중...</div>`;

  if (isImage) {
    compressImage(file, 1280, 0.72)
      .then(dataURL => {
        pendingMedia = { type: 'image', data: dataURL };
        showPreview();
      })
      .catch(() => { clearAttach(); showToast('사진을 불러오지 못했어요.'); });
  } else {
    if (file.size > MAX_VIDEO_MB * 1024 * 1024) {
      clearAttach();
      showToast(`동영상은 ${MAX_VIDEO_MB}MB 이하만 보낼 수 있어요.`);
      return;
    }
    fileToDataURL(file)
      .then(dataURL => {
        pendingMedia = { type: 'video', data: dataURL };
        showPreview();
      })
      .catch(() => { clearAttach(); showToast('동영상을 불러오지 못했어요.'); });
  }
}

// ── 사진 압축 (캔버스로 리사이즈 후 JPEG 변환) ──
function compressImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = ev => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
        else if (height >= width && height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ev => resolve(ev.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  const preview = document.getElementById('attachPreview');
  if (!pendingMedia) { clearAttach(); return; }
  const media = pendingMedia.type === 'image'
    ? `<img src="${pendingMedia.data}" alt="첨부 사진">`
    : `<video src="${pendingMedia.data}" controls playsinline></video>`;
  preview.innerHTML = media + `<button type="button" class="attach-remove" onclick="clearAttach()" title="첨부 취소">✕</button>`;
  preview.style.display = 'block';
}

  if (!text && !pendingMedia) return;   // 글도 첨부도 없으면 무시
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const msg = { from: currentSender, text, date: dateStr, ts: now.getTime() };
  if (pendingMedia) { msg.mediaType = pendingMedia.type; msg.mediaData = pendingMedia.data; }

  const sendBtn = document.querySelector('.msg-send-btn');
  if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = '보내는 중... ⏳'; }

  db.ref(HUB_REF).push(msg)
    .then(() => {
      document.getElementById('msgInput').value = '';
      clearAttach();
      showToast(currentSender === 'lily' ? '🧚 Lily의 쪽지가 전송됐어요!' : '🌟 Joy의 쪽지가 전송됐어요!');
    })
    .catch(() => showToast('전송 실패. 인터넷 연결이나 용량을 확인해주세요.'))
    .finally(() => {
      if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = '보내기 💌'; }
    });
}

// ── 메시지 삭제 ──
function deleteMsg(key) {
  if (!confirm('이 쪽지를 삭제할까요?')) return;
  db.ref(`${HUB_REF}/${key}`).remove();
}

// ── 메시지 렌더링 ──
function renderMsgs(msgs) {
  const list = document.getElementById('msgList');
  if (!msgs || msgs.length === 0) {
    list.innerHTML = `<div class="msg-empty"><span class="empty-icon">💌</span>아직 쪽지가 없어요. 첫 번째 쪽지를 남겨보세요!</div>`;
    return;
  }
  list.innerHTML = msgs.map(m => {
    const senderLabel = m.from === 'lily' ? '🧚 Lily' : '🌟 Joy';
    const text = m.text || '';
    const escaped = text.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    let mediaHtml = '';
    if (m.mediaType === 'image' && m.mediaData) {
      mediaHtml = `<img class="msg-media is-image" src="${m.mediaData}" alt="사진" onclick="openLightbox(this.src)">`;
    } else if (m.mediaType === 'video' && m.mediaData) {
      mediaHtml = `<video class="msg-media" src="${m.mediaData}" controls playsinline preload="metadata"></video>`;
    }
    const textHtml = text ? `<div class="msg-text">${escaped}</div>` : '';
    return `<div class="msg-bubble from-${m.from}">
      <button class="msg-del" onclick="deleteMsg('${m.key}')" title="삭제">✕</button>
      <div class="msg-sender">${senderLabel}</div>
      ${mediaHtml}
      ${textHtml}
      <div class="msg-date">${m.date}</div>
    </div>`;
  }).join('');
  list.scrollTop = list.scrollHeight;
}

// ── Firebase 실시간 리스너 ──
db.ref(HUB_REF).on('value', snapshot => {
  const val = snapshot.val();
  const msgs = [];
  if (val) {
    Object.entries(val).forEach(([key, msg]) => msgs.push({ ...msg, key }));
    msgs.sort((a, b) => (a.ts || 0) - (b.ts || 0));
  }
  renderMsgs(msgs);
});

// ── Toast ──
function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Enter 키로 전송 ──
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// ── 배경 별 생성 ──
function createStars() {
  const container = document.getElementById('stars');
  const symbols = ['✦', '✧', '⭐', '✨', '·'];
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3.4 + 's';
    star.style.fontSize = (7 + Math.random() * 18) + 'px';
    container.appendChild(star);
  }
}

function createWeatherDrift() {
  const container = document.getElementById('weatherDrift');
  const symbols = ['☁️','✨','💧','❄️','☀️','🌈'];
  for (let i = 0; i < 14; i++) {
    const drift = document.createElement('div');
    drift.className = 'drift';
    drift.textContent = symbols[i % symbols.length];
    drift.style.top = (5 + Math.random() * 86) + '%';
    drift.style.left = (-18 + Math.random() * 80) + 'vw';
    drift.style.fontSize = (20 + Math.random() * 22) + 'px';
    drift.style.animationDuration = (28 + Math.random() * 26) + 's';
    drift.style.animationDelay = (-Math.random() * 40) + 's';
    container.appendChild(drift);
  }
}

// ── 날개 애니메이션 (CSS에서 못 쓰는 svg 내부용) ──
const style = document.createElement('style');
style.textContent = `
  @keyframes wingFlap {
    0%, 100% { transform: scaleX(1); }
    50%       { transform: scaleX(.9); }
  }
`;
document.head.appendChild(style);

createStars();
createWeatherDrift();
</script>
</body>
